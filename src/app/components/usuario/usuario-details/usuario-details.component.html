<div class="container-lg px-4 ja-form-page">

  <div class="ja-form-page-header">
    <div>
      <div class="ja-breadcrumb-overline">
        <a routerLink="/usuarios/lista">Usuários</a>
        <span class="sep">›</span>
        <span class="current">{{ isEdicao ? 'Editar' : 'Novo' }}</span>
      </div>
      <h1 class="ja-page-title">{{ isEdicao ? 'Editar Usuário' : 'Cadastrar Usuário' }}</h1>
    </div>
    <div class="ja-form-actions">
      <a routerLink="/usuarios/lista" cButton color="secondary" variant="ghost">
        <fa-icon [icon]="faArrowLeft" class="me-1"></fa-icon> Cancelar
      </a>
      <button type="button" cButton color="primary" [disabled]="form.invalid" (click)="salvar()">
        <fa-icon [icon]="faSave" class="me-1"></fa-icon>
        {{ isEdicao ? 'Salvar Alterações' : 'Salvar Usuário' }}
      </button>
    </div>
  </div>

  <form [formGroup]="form" (ngSubmit)="salvar()">

    <section class="ja-form-section">
      <div class="ja-form-section-title">Dados do Usuário</div>
      <div class="ja-form-section-body">
        <div class="ja-form-grid">

          <div class="ja-form-field">
            <label cLabel for="nome">Nome Completo *</label>
            <input cFormControl id="nome" formControlName="nome" placeholder="Nome completo" />
            <span class="form-error" *ngIf="form.get('nome')?.invalid && form.get('nome')?.touched">
              Nome é obrigatório
            </span>
          </div>

          <div class="ja-form-field">
            <label cLabel for="email">E-mail *</label>
            <input cFormControl id="email" type="email" formControlName="email"
                   placeholder="usuario@email.com" />
            <span class="form-error" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
              E-mail válido é obrigatório
            </span>
          </div>

          <div class="ja-form-field">
            <label cLabel for="cpf">CPF *</label>
            <input cFormControl id="cpf" formControlName="cpf"
                   placeholder="000.000.000-00" mask="000.000.000-00" />
            <span class="form-hint" *ngIf="isEdicao">CPF não pode ser alterado após o cadastro</span>
            <span class="form-error" *ngIf="form.get('cpf')?.invalid && form.get('cpf')?.touched">
              CPF é obrigatório
            </span>
          </div>

          <div class="ja-form-field">
            <label cLabel for="senha">Senha *</label>
            <input cFormControl id="senha" type="password" formControlName="senha"
                   placeholder="Mínimo 6 caracteres" />
            <span class="form-error" *ngIf="form.get('senha')?.invalid && form.get('senha')?.touched">
              Senha é obrigatória (mínimo 6 caracteres)
            </span>
          </div>

        </div>
      </div>
    </section>

  </form>

  <div class="ja-form-actions-sticky">
    <a routerLink="/usuarios/lista" cButton color="secondary" variant="ghost">
      <fa-icon [icon]="faArrowLeft" class="me-1"></fa-icon> Cancelar
    </a>
    <button type="button" cButton color="primary" [disabled]="form.invalid" (click)="salvar()">
      <fa-icon [icon]="faSave" class="me-1"></fa-icon>
      {{ isEdicao ? 'Salvar Alterações' : 'Salvar Usuário' }}
    </button>
  </div>

</div>
