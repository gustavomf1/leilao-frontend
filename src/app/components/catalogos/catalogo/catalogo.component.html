<c-row>
  <c-col>
    <c-card>
      <c-card-header>
        <strong>Catálogos</strong>
      </c-card-header>

      <c-card-body>
        <c-row class="mb-3">

          <!-- SELECT -->
          <c-col [md]="5">
            <label class="form-label fw-semibold">Leilão</label>

            <select class="form-select" [(ngModel)]="selectedLeilaoId" (ngModelChange)="onLeilaoChange()">

              <option [ngValue]="undefined">
                Selecione um leilão...
              </option>

              <option *ngFor="let l of leiloes" [ngValue]="l.id">
                {{ l.descricao }} — {{ l.data }}
              </option>

            </select>
          </c-col>

          <!-- BOTÕES -->
          <c-col [md]="7" class="d-flex align-items-end gap-2 flex-wrap">

            <!-- CATÁLOGO 1 -->
            <button cButton color="primary" [disabled]="!canGenerate || loading" (click)="gerarCatalogo(1)">

              <c-spinner *ngIf="loadingCatalogo === 1" size="sm" class="me-1">
              </c-spinner>

              {{ loadingCatalogo === 1 ? 'Gerando...' : 'Catálogo 1' }}
            </button>

            <!-- CATÁLOGO 2 -->
            <button cButton color="info" [disabled]="!canGenerate || loading" (click)="gerarCatalogo(2)">

              <c-spinner *ngIf="loadingCatalogo === 2" size="sm" class="me-1">
              </c-spinner>

              {{ loadingCatalogo === 2 ? 'Gerando...' : 'Catálogo 2' }}
            </button>

            <!-- CATÁLOGO 3 -->
            <button cButton color="warning" [disabled]="!canGenerate || loading" (click)="gerarCatalogo(3)">

              <c-spinner *ngIf="loadingCatalogo === 3" size="sm" class="me-1">
              </c-spinner>

              {{ loadingCatalogo === 3 ? 'Gerando...' : 'Catálogo 3' }}
            </button>

          </c-col>

        </c-row>
      </c-card-body>
    </c-card>
  </c-col>
</c-row>
