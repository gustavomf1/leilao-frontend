<div class="container-lg px-4 ja-anim-fade-in">

  <div class="ja-form-page-header">
    <div>
      <div class="ja-breadcrumb-overline"><span class="current">Comunicação</span></div>
      <h1 class="ja-page-title">WhatsApp</h1>
    </div>
  </div>

  <c-card>
    <c-card-body>
      <c-nav variant="tabs">
        <c-nav-item>
          <a [active]="true" [cTabContent]="tabContent" [tabPaneIdx]="0" cNavLink>
            <fa-icon [icon]="faPaperPlane" class="me-1"></fa-icon> Enviar Texto
          </a>
        </c-nav-item>
        <c-nav-item>
          <a [cTabContent]="tabContent" [tabPaneIdx]="1" cNavLink>
            <fa-icon [icon]="faImage" class="me-1"></fa-icon> Enviar Mídia
          </a>
        </c-nav-item>
        <c-nav-item>
          <a [cTabContent]="tabContent" [tabPaneIdx]="2" cNavLink>
            <fa-icon [icon]="faBullhorn" class="me-1"></fa-icon> Texto em Massa
          </a>
        </c-nav-item>
        <c-nav-item>
          <a [cTabContent]="tabContent" [tabPaneIdx]="3" cNavLink>
            <fa-icon [icon]="faFileAlt" class="me-1"></fa-icon> Mídia em Massa
          </a>
        </c-nav-item>
      </c-nav>

      <c-tab-content #tabContent="cTabContent" [activeTabPaneIdx]="0">

        <!-- ── TAB 1: Enviar Texto ── -->
        <c-tab-pane>
          <form [formGroup]="formTexto" (ngSubmit)="enviarTexto()">
            <section class="ja-form-section">
              <div class="ja-form-section-title">
                <fa-icon [icon]="faPaperPlane"></fa-icon>
                Envio de Texto Individual
              </div>
              <div class="ja-form-section-body">
                <div class="ja-form-grid">
                  <div class="ja-form-field">
                    <label class="form-label">Número *</label>
                    <input cFormControl id="txtNumber" formControlName="number" placeholder="5511999999999" />
                    <span class="form-hint">DDI + DDD + número sem espaços ou traços</span>
                  </div>
                  <div class="ja-form-field">
                    <label class="form-label">Delay (ms)</label>
                    <input cFormControl id="txtDelay" type="number" formControlName="delay" placeholder="1200" />
                    <span class="form-hint">Aguardar antes de enviar</span>
                  </div>
                  <div class="ja-form-field field-full">
                    <label class="form-label">Mensagem *</label>
                    <textarea cFormControl id="txtText" formControlName="text" rows="4" placeholder="Olá! Tudo bem?"></textarea>
                  </div>
                </div>
                <div class="d-flex justify-content-end mt-3">
                  <button type="submit" cButton color="success" [disabled]="formTexto.invalid || enviando">
                    <fa-icon [icon]="faPaperPlane" class="me-1"></fa-icon>
                    {{ enviando ? 'Enviando...' : 'Enviar Texto' }}
                  </button>
                </div>
              </div>
            </section>
          </form>
        </c-tab-pane>

        <!-- ── TAB 2: Enviar Mídia ── -->
        <c-tab-pane>
          <form [formGroup]="formMidia" (ngSubmit)="enviarMidia()">
            <section class="ja-form-section">
              <div class="ja-form-section-title">
                <fa-icon [icon]="faImage"></fa-icon>
                Envio de Mídia Individual
              </div>
              <div class="ja-form-section-body">
                <div class="ja-form-grid">
                  <div class="ja-form-field">
                    <label class="form-label">Número *</label>
                    <input cFormControl id="mediaNumber" formControlName="number" placeholder="5511999999999" />
                  </div>
                  <div class="ja-form-field">
                    <label class="form-label">Tipo de Mídia *</label>
                    <select cFormControl id="mediaType" formControlName="mediatype">
                      <option value="image">Imagem</option>
                      <option value="video">Vídeo</option>
                      <option value="audio">Áudio</option>
                      <option value="document">Documento</option>
                    </select>
                  </div>
                  <div class="ja-form-field">
                    <label class="form-label">MIME Type *</label>
                    <input cFormControl id="mediaMime" formControlName="mimeType" placeholder="image/jpeg" />
                  </div>
                  <div class="ja-form-field">
                    <label class="form-label">Nome do Arquivo *</label>
                    <input cFormControl id="mediaFileName" formControlName="fileName" placeholder="foto.jpg" />
                  </div>
                  <div class="ja-form-field field-full">
                    <label class="form-label">URL do Arquivo *</label>
                    <input cFormControl id="mediaUrl" formControlName="url" placeholder="https://exemplo.com/imagem.jpg" />
                  </div>
                  <div class="ja-form-field field-full">
                    <label class="form-label">Legenda</label>
                    <input cFormControl id="mediaCaption" formControlName="caption" placeholder="Confira o documento anexo!" />
                  </div>
                </div>
                <div class="d-flex justify-content-end mt-3">
                  <button type="submit" cButton color="success" [disabled]="formMidia.invalid || enviando">
                    <fa-icon [icon]="faPaperPlane" class="me-1"></fa-icon>
                    {{ enviando ? 'Enviando...' : 'Enviar Mídia' }}
                  </button>
                </div>
              </div>
            </section>
          </form>
        </c-tab-pane>

        <!-- ── TAB 3: Texto em Massa ── -->
        <c-tab-pane>
          <form [formGroup]="formBulkTexto" (ngSubmit)="enviarBulkTexto()">
            <section class="ja-form-section">
              <div class="ja-form-section-title">
                <fa-icon [icon]="faBullhorn"></fa-icon>
                Contatos
              </div>
              <div class="ja-form-section-body">
                <div formArrayName="contatos">
                  <div *ngFor="let contato of contatosBulkTexto.controls; let i = index"
                       [formGroupName]="i"
                       class="ja-form-grid mb-2">
                    <div class="ja-form-field">
                      <input cFormControl formControlName="number" placeholder="5511988887777" />
                    </div>
                    <div class="ja-form-field d-flex gap-2">
                      <input cFormControl formControlName="nome" placeholder="Nome do contato" class="flex-grow-1" />
                      <button type="button" cButton color="danger" size="sm" variant="ghost"
                              (click)="removeContato(contatosBulkTexto, i)">
                        <fa-icon [icon]="faTrash"></fa-icon>
                      </button>
                    </div>
                  </div>
                </div>
                <button type="button" cButton color="secondary" variant="ghost" size="sm"
                        (click)="addContato(contatosBulkTexto)">
                  <fa-icon [icon]="faPlus" class="me-1"></fa-icon> Adicionar Contato
                </button>
              </div>
            </section>

            <section class="ja-form-section">
              <div class="ja-form-section-title">Mensagem e Configurações</div>
              <div class="ja-form-section-body">
                <div class="ja-form-grid">
                  <div class="ja-form-field field-full">
                    <label class="form-label">Mensagem *</label>
                    <textarea cFormControl formControlName="text" rows="3" placeholder="Olá, temos novidades!"></textarea>
                  </div>
                  <div class="ja-form-field">
                    <label class="form-label">Delay Mínimo (ms)</label>
                    <input cFormControl type="number" formControlName="delayMinMs" placeholder="3000" />
                  </div>
                  <div class="ja-form-field">
                    <label class="form-label">Delay Máximo (ms)</label>
                    <input cFormControl type="number" formControlName="delayMaxMs" placeholder="8000" />
                  </div>
                </div>
                <div class="d-flex justify-content-end mt-3">
                  <button type="submit" cButton color="success" [disabled]="formBulkTexto.invalid || enviando">
                    <fa-icon [icon]="faBullhorn" class="me-1"></fa-icon>
                    {{ enviando ? 'Enviando...' : 'Enviar em Massa' }}
                  </button>
                </div>
              </div>
            </section>
          </form>
        </c-tab-pane>

        <!-- ── TAB 4: Mídia em Massa ── -->
        <c-tab-pane>
          <form [formGroup]="formBulkMidia" (ngSubmit)="enviarBulkMidia()">
            <section class="ja-form-section">
              <div class="ja-form-section-title">
                <fa-icon [icon]="faFileAlt"></fa-icon>
                Contatos
              </div>
              <div class="ja-form-section-body">
                <div formArrayName="contatos">
                  <div *ngFor="let contato of contatosBulkMidia.controls; let i = index"
                       [formGroupName]="i"
                       class="ja-form-grid mb-2">
                    <div class="ja-form-field">
                      <input cFormControl formControlName="number" placeholder="5511988887777" />
                    </div>
                    <div class="ja-form-field d-flex gap-2">
                      <input cFormControl formControlName="nome" placeholder="Nome do contato" class="flex-grow-1" />
                      <button type="button" cButton color="danger" size="sm" variant="ghost"
                              (click)="removeContato(contatosBulkMidia, i)">
                        <fa-icon [icon]="faTrash"></fa-icon>
                      </button>
                    </div>
                  </div>
                </div>
                <button type="button" cButton color="secondary" variant="ghost" size="sm"
                        (click)="addContato(contatosBulkMidia)">
                  <fa-icon [icon]="faPlus" class="me-1"></fa-icon> Adicionar Contato
                </button>
              </div>
            </section>

            <section class="ja-form-section">
              <div class="ja-form-section-title">Mídia e Configurações</div>
              <div class="ja-form-section-body">
                <div class="ja-form-grid">
                  <div class="ja-form-field field-full">
                    <label class="form-label">URL do Arquivo *</label>
                    <input cFormControl formControlName="url" placeholder="https://exemplo.com/catalogo.pdf" />
                  </div>
                  <div class="ja-form-field field-full">
                    <label class="form-label">Legenda</label>
                    <input cFormControl formControlName="caption" placeholder="Nosso catálogo atualizado!" />
                  </div>
                  <div class="ja-form-field">
                    <label class="form-label">Tipo de Mídia *</label>
                    <select cFormControl formControlName="mediatype">
                      <option value="image">Imagem</option>
                      <option value="video">Vídeo</option>
                      <option value="audio">Áudio</option>
                      <option value="document">Documento</option>
                    </select>
                  </div>
                  <div class="ja-form-field">
                    <label class="form-label">MIME Type *</label>
                    <input cFormControl formControlName="mimeType" placeholder="application/pdf" />
                  </div>
                  <div class="ja-form-field">
                    <label class="form-label">Delay Mínimo (ms)</label>
                    <input cFormControl type="number" formControlName="delayMinMs" placeholder="3000" />
                  </div>
                  <div class="ja-form-field">
                    <label class="form-label">Delay Máximo (ms)</label>
                    <input cFormControl type="number" formControlName="delayMaxMs" placeholder="8000" />
                  </div>
                </div>
                <div class="d-flex justify-content-end mt-3">
                  <button type="submit" cButton color="success" [disabled]="formBulkMidia.invalid || enviando">
                    <fa-icon [icon]="faBullhorn" class="me-1"></fa-icon>
                    {{ enviando ? 'Enviando...' : 'Enviar Mídia em Massa' }}
                  </button>
                </div>
              </div>
            </section>
          </form>
        </c-tab-pane>

      </c-tab-content>
    </c-card-body>
  </c-card>

</div>
