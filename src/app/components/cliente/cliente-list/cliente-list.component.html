<div class="container-lg px-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">Clientes</h2>
    <a *ngIf="auth.hasPermission('CLIENTES', 'CRIAR')" routerLink="/clientes/cadastrar" cButton color="primary" size="sm">
      <fa-icon [icon]="faPlus" class="me-2"></fa-icon>
      Novo Cliente
    </a>
  </div>

  <c-card>
    <c-card-body>
      <table cTable hover responsive>
        <thead>
          <tr>
            <th>#</th>
            <th>Nome</th>
            <th>CPF</th>
            <th>Telefone</th>
            <th>Cidade/UF</th>
            <th class="text-center">Ações</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let cliente of clientes$ | async">
            <td>{{ cliente.id }}</td>
            <td>{{ cliente.nome }}</td>
            <td>{{ cliente.cpf }}</td>
            <td>{{ cliente.telefone }}</td>
            <td>{{ cliente.cidade }}/{{ cliente.uf }}</td>
            <td class="text-center">
              <button cButton color="success" size="sm" variant="ghost" (click)="abrirModalPix(cliente)" title="Gerenciar Pix">
                <fa-icon [icon]="faKey"></fa-icon>
              </button>
              <a *ngIf="auth.hasPermission('CLIENTES', 'EDITAR')" [routerLink]="['/clientes', cliente.id]" cButton color="info" size="sm" variant="ghost">
                <fa-icon [icon]="faPencil"></fa-icon>
              </a>
              <button *ngIf="auth.hasPermission('CLIENTES', 'DELETAR')" cButton color="danger" size="sm" variant="ghost" (click)="deletar(cliente.id!)">
                <fa-icon [icon]="faTrash"></fa-icon>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </c-card-body>
  </c-card>
</div>

<!-- ─── Modal de Chaves Pix ─────────────────────────────────── -->
<c-modal [(visible)]="modalPixVisivel" alignment="center" size="lg">
  <c-modal-header>
    <h5 cModalTitle>
      <fa-icon [icon]="faKey" class="me-2"></fa-icon>
      Chaves Pix — {{ clienteSelecionado?.nome }}
    </h5>
    <button cButtonClose (click)="fecharModalPix()"></button>
  </c-modal-header>
  <c-modal-body>

    <div class="row g-3 align-items-end mb-4">
      <div class="col-md-4">
        <label cLabel>Tipo</label>
        <select cFormSelect [(ngModel)]="novoPix.tipo">
          <option *ngFor="let tipo of tiposPix" [value]="tipo">{{ tipo }}</option>
        </select>
      </div>
      <div class="col-md-5">
        <label cLabel>Chave</label>
        <input cFormControl [(ngModel)]="novoPix.chave" placeholder="Ex: email@email.com" />
      </div>
      <div class="col-md-3">
        <button cButton color="primary" size="sm" (click)="adicionarPix()">
          <fa-icon [icon]="faPlus" class="me-1"></fa-icon>
          Adicionar
        </button>
      </div>
    </div>

    <hr />

    <table cTable hover responsive>
      <thead>
        <tr>
          <th>Tipo</th>
          <th>Chave</th>
          <th class="text-center">Remover</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let pix of pixKeys">
          <td><c-badge color="info">{{ pix.tipo }}</c-badge></td>
          <td>{{ pix.chave }}</td>
          <td class="text-center">
            <button cButton color="danger" size="sm" variant="ghost" (click)="deletarPix(pix.pixId!)">
              <fa-icon [icon]="faTrash"></fa-icon>
            </button>
          </td>
        </tr>
        <tr *ngIf="pixKeys.length === 0">
          <td colspan="3" class="text-center text-muted">Nenhuma chave cadastrada</td>
        </tr>
      </tbody>
    </table>

  </c-modal-body>
  <c-modal-footer>
    <button cButton color="secondary" variant="ghost" (click)="fecharModalPix()">Fechar</button>
  </c-modal-footer>
</c-modal>
