<div class="container-lg px-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">Racas</h2>
    <a routerLink="/racas/cadastrar" cButton color="primary" size="sm">
      <fa-icon [icon]="faPlus" class="me-2"></fa-icon>
      Nova Raca
    </a>
  </div>

  <c-card>
    <c-card-body>
      <table cTable hover responsive>
        <thead>
          <tr>
            <th>#</th>
            <th>Nome</th>
            <th>Especie</th>
            <th class="text-center">Status</th>
            <th class="text-center">Acoes</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let raca of racas$ | async">
            <td>{{ raca.id }}</td>
            <td>{{ raca.nome }}</td>
            <td>{{ raca.especieNome }}</td>
            <td class="text-center">
              <span [class]="raca.inativo === 'S' ? 'badge bg-danger' : 'badge bg-success'">
                {{ raca.inativo === 'S' ? 'Inativo' : 'Ativo' }}
              </span>
            </td>
            <td class="text-center">
              <a [routerLink]="['/racas', raca.id]" cButton color="info" size="sm" variant="ghost">
                <fa-icon [icon]="faPencil"></fa-icon>
              </a>
              <button cButton [color]="raca.inativo === 'S' ? 'success' : 'warning'" size="sm" variant="ghost"
                      (click)="toggleInativo(raca)"
                      [title]="raca.inativo === 'S' ? 'Ativar' : 'Inativar'">
                <fa-icon [icon]="raca.inativo === 'S' ? faToggleOff : faToggleOn"></fa-icon>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </c-card-body>
  </c-card>
</div>
