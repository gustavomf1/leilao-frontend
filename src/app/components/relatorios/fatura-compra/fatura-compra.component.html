<c-row>
  <c-col>
    <c-card>
      <c-card-header>
        <strong>Relatório — Fatura de Compra</strong>
      </c-card-header>
      <c-card-body>
        <c-row class="mb-3">
          <c-col [md]="5">
            <label class="form-label fw-semibold">Leilão</label>
            <select class="form-select"
                    [(ngModel)]="selectedLeilaoId"
                    (ngModelChange)="onLeilaoChange()">
              <option [ngValue]="undefined">Selecione um leilão...</option>
              <option *ngFor="let l of leiloes" [ngValue]="l.id">
                {{ l.descricao }} — {{ l.data }}
              </option>
            </select>
          </c-col>
          <c-col [md]="5">
            <label class="form-label fw-semibold">Comprador</label>
            <select class="form-select"
                    [(ngModel)]="selectedCompradorId"
                    [disabled]="!selectedLeilaoId || compradores.length === 0">
              <option [ngValue]="undefined">
                {{ selectedLeilaoId && compradores.length === 0
                   ? 'Nenhum comprador encontrado'
                   : 'Selecione um comprador...' }}
              </option>
              <option *ngFor="let c of compradores" [ngValue]="c.id">
                {{ c.nome }}
              </option>
            </select>
          </c-col>
          <c-col [md]="2" class="d-flex align-items-end">
            <button cButton color="primary"
                    class="w-100"
                    [disabled]="!canGenerate"
                    (click)="gerarFatura()">
              <c-spinner *ngIf="loading" size="sm" class="me-1"></c-spinner>
              {{ loading ? 'Gerando...' : 'Gerar PDF' }}
            </button>
          </c-col>
        </c-row>
        <c-row *ngIf="selectedLeilaoId && compradores.length === 0">
          <c-col>
            <p class="text-muted small mb-0">
              Nenhum comprador com lotes encontrado neste leilão.
            </p>
          </c-col>
        </c-row>
      </c-card-body>
    </c-card>
  </c-col>
</c-row>
