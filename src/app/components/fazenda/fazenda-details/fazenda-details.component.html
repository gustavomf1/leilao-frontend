<div class="container-lg px-4 ja-form-page">

  <!-- ─── Header ─────────────────────────────────────────── -->
  <div class="ja-form-page-header" *ngIf="!modoDrawer">
    <div>
      <div class="ja-breadcrumb-overline">
        <a routerLink="/fazendas/lista">Fazendas</a>
        <span class="sep">›</span>
        <span class="current">{{ isEdicao ? 'Editar' : 'Nova' }}</span>
      </div>
      <h1 class="ja-page-title">{{ isEdicao ? 'Editar Fazenda' : 'Cadastrar Fazenda' }}</h1>
    </div>
    <div class="ja-form-actions" *ngIf="!modoSubform">
      <a routerLink="/fazendas/lista" cButton color="secondary" variant="ghost">
        <fa-icon [icon]="faArrowLeft" class="me-1"></fa-icon> Cancelar
      </a>
      <button type="button" cButton color="primary" [disabled]="form.invalid" (click)="salvar()">
        <fa-icon [icon]="faSave" class="me-1"></fa-icon>
        {{ isEdicao ? 'Salvar Alterações' : 'Salvar Fazenda' }}
      </button>
    </div>
  </div>

  <!-- ─── Form ───────────────────────────────────────────── -->
  <form [formGroup]="form" (ngSubmit)="salvar()">

    <!-- Section: Dados da Fazenda -->
    <section class="ja-form-section">
      <div class="ja-form-section-title">
        <fa-icon [icon]="faHome"></fa-icon>
        Dados da Fazenda
      </div>
      <div class="ja-form-section-body">
        <div class="ja-form-grid">

          <div class="ja-form-field">
            <label cLabel for="nome">Nome da Fazenda *</label>
            <input cFormControl id="nome" formControlName="nome" placeholder="Ex: Fazenda Boa Vista" />
            <span class="form-error" *ngIf="form.get('nome')?.invalid && form.get('nome')?.touched">
              Nome é obrigatório
            </span>
          </div>

          <div class="ja-form-field">
            <label cLabel for="inscricao">Inscrição Estadual *</label>
            <input cFormControl id="inscricao" formControlName="inscricao" placeholder="Inscrição estadual" />
            <span class="form-error" *ngIf="form.get('inscricao')?.invalid && form.get('inscricao')?.touched">
              Inscrição é obrigatória
            </span>
          </div>

          <div class="ja-form-field">
            <label cLabel for="cnpj">CNPJ *</label>
            <input cFormControl id="cnpj" formControlName="cnpj"
                   placeholder="00.000.000/0000-00" mask="00.000.000/0000-00" />
            <span class="form-error" *ngIf="form.get('cnpj')?.invalid && form.get('cnpj')?.touched">
              CNPJ é obrigatório
            </span>
          </div>

          <div class="ja-form-field" *ngIf="!ocultarTitular">
            <app-subform
              label="Titular (Cliente)"
              [displayValue]="nomeTitularSelecionado"
              modalTitle="Selecionar Titular"
              #pickerTitular>
              <app-cliente-picker></app-cliente-picker>
            </app-subform>
            <input type="hidden" formControlName="titularId" />
            <span class="form-hint">Cliente proprietário desta fazenda</span>
          </div>

        </div>
      </div>
    </section>

    <!-- Section: Localização -->
    <section class="ja-form-section">
      <div class="ja-form-section-title">
        <fa-icon [icon]="faMapMarker"></fa-icon>
        Localização
      </div>
      <div class="ja-form-section-body">
        <div class="ja-form-grid">

          <div class="ja-form-field">
            <label cLabel for="cidade">Cidade *</label>
            <input cFormControl id="cidade" formControlName="cidade" placeholder="Pirassununga" />
            <span class="form-error" *ngIf="form.get('cidade')?.invalid && form.get('cidade')?.touched">
              Cidade é obrigatória
            </span>
          </div>

          <div class="ja-form-field">
            <label cLabel for="uf">UF *</label>
            <select cFormControl id="uf" formControlName="uf">
              <option value="" disabled>Selecione...</option>
              <option *ngFor="let uf of ufs" [value]="uf">{{ uf }}</option>
            </select>
            <span class="form-error" *ngIf="form.get('uf')?.invalid && form.get('uf')?.touched">
              UF é obrigatória
            </span>
          </div>

        </div>
      </div>
    </section>

  <!-- ─── Botão salvar inline para modoDrawer/modoSubform ── -->
  <div class="d-flex justify-content-end mt-3" *ngIf="modoDrawer || modoSubform">
    <button type="button" cButton color="primary" [disabled]="form.invalid" (click)="salvar()">
      <fa-icon [icon]="faSave" class="me-1"></fa-icon>
      {{ isEdicao ? 'Salvar Alterações' : 'Salvar Fazenda' }}
    </button>
  </div>

  </form>

  <!-- ─── Sticky footer ──────────────────────────────────── -->
  <div class="ja-form-actions-sticky" *ngIf="!modoSubform && !modoDrawer">
    <a routerLink="/fazendas/lista" cButton color="secondary" variant="ghost">
      <fa-icon [icon]="faArrowLeft" class="me-1"></fa-icon> Cancelar
    </a>
    <button type="button" cButton color="primary" [disabled]="form.invalid" (click)="salvar()">
      <fa-icon [icon]="faSave" class="me-1"></fa-icon>
      {{ isEdicao ? 'Salvar Alterações' : 'Salvar Fazenda' }}
    </button>
  </div>

</div>
