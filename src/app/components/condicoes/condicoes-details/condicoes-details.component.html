<div class="container-lg px-4 ja-form-page">

  <div class="ja-form-page-header">
    <div>
      <div class="ja-breadcrumb-overline">
        <a routerLink="/condicoes/lista">Condições</a>
        <span class="sep">›</span>
        <span class="current">{{ isEdicao ? 'Editar' : 'Nova' }}</span>
      </div>
      <h1 class="ja-page-title">{{ isEdicao ? 'Editar Condição' : 'Cadastrar Condição' }}</h1>
    </div>
    <div class="ja-form-actions">
      <a routerLink="/condicoes/lista" cButton color="secondary" variant="ghost">
        <fa-icon [icon]="faArrowLeft" class="me-1"></fa-icon> Cancelar
      </a>
      <button type="button" cButton color="primary" [disabled]="form.invalid" (click)="salvar()">
        <fa-icon [icon]="faSave" class="me-1"></fa-icon>
        {{ isEdicao ? 'Salvar Alterações' : 'Salvar Condição' }}
      </button>
    </div>
  </div>

  <form [formGroup]="form" (ngSubmit)="salvar()">

    <!-- Identificação -->
    <section class="ja-form-section">
      <div class="ja-form-section-title">Identificação</div>
      <div class="ja-form-section-body">
        <div class="ja-form-grid">
          <div class="ja-form-field field-full">
            <label cLabel for="descricao">Descrição *</label>
            <input cFormControl id="descricao" formControlName="descricao"
                   placeholder="Ex: 10 DIAS DIRETO" />
            <span class="form-error" *ngIf="form.get('descricao')?.invalid && form.get('descricao')?.touched">
              Descrição é obrigatória
            </span>
          </div>
        </div>
      </div>
    </section>

    <!-- Parâmetros financeiros -->
    <section class="ja-form-section">
      <div class="ja-form-section-title">Parâmetros Financeiros</div>
      <div class="ja-form-section-body">
        <div class="ja-form-grid">

          <div class="ja-form-field">
            <label cLabel for="captacao">Captação</label>
            <input cFormControl id="captacao" type="number" formControlName="captacao"
                   placeholder="Dias de captação" />
          </div>

          <div class="ja-form-field">
            <label cLabel for="parcelas">Parcelas</label>
            <input cFormControl id="parcelas" type="number" formControlName="parcelas"
                   placeholder="Nº de parcelas" />
          </div>

          <div class="ja-form-field">
            <label cLabel for="qtdDias">Quantidade de Dias</label>
            <input cFormControl id="qtdDias" type="number" formControlName="qtdDias"
                   placeholder="Dias entre parcelas" />
          </div>

          <div class="ja-form-field">
            <label cLabel for="percentualDesconto">% Desconto</label>
            <input cFormControl id="percentualDesconto" type="number" formControlName="percentualDesconto"
                   placeholder="0,00" step="0.01" />
          </div>

        </div>

        <div class="ja-form-field mt-3">
          <label cLabel>Opções</label>
          <div class="ja-toggle-group" style="max-width: 420px;">
            <button type="button" class="ja-toggle-pill"
                    [class.active]="form.get('comEntrada')?.value === 'S'"
                    (click)="form.get('comEntrada')?.setValue(form.get('comEntrada')?.value === 'S' ? 'N' : 'S')">
              Com entrada
            </button>
            <button type="button" class="ja-toggle-pill"
                    [class.active]="form.get('mesmoDia')?.value === 'S'"
                    (click)="form.get('mesmoDia')?.setValue(form.get('mesmoDia')?.value === 'S' ? 'N' : 'S')">
              Mesmo dia
            </button>
          </div>
          <span class="form-hint">Toque para alternar cada opção</span>
        </div>
      </div>
    </section>

    <!-- Classificação -->
    <section class="ja-form-section">
      <div class="ja-form-section-title">Classificação</div>
      <div class="ja-form-section-body">
        <div class="ja-form-grid">

          <div class="ja-form-field">
            <label cLabel for="tipoCondicao">Tipo</label>
            <select cFormControl id="tipoCondicao" formControlName="tipoCondicao">
              <option [ngValue]="null">— Sem tipo específico —</option>
              <option *ngFor="let tipo of tiposCondicao" [value]="tipo">{{ tipo }}</option>
            </select>
          </div>

          <div class="ja-form-field">
            <label cLabel for="aceiteIntegrado">Aceite Integrado (Comissão Venda)</label>
            <select cFormControl id="aceiteIntegrado" formControlName="aceiteIntegrado">
              <option *ngFor="let aceite of aceitesIntegrado" [value]="aceite.value">{{ aceite.label }}</option>
            </select>
            <span class="form-hint">Como descontar a comissão de venda nas parcelas</span>
          </div>

        </div>
      </div>
    </section>

  </form>

  <div class="ja-form-actions-sticky">
    <a routerLink="/condicoes/lista" cButton color="secondary" variant="ghost">
      <fa-icon [icon]="faArrowLeft" class="me-1"></fa-icon> Cancelar
    </a>
    <button type="button" cButton color="primary" [disabled]="form.invalid" (click)="salvar()">
      <fa-icon [icon]="faSave" class="me-1"></fa-icon>
      {{ isEdicao ? 'Salvar Alterações' : 'Salvar Condição' }}
    </button>
  </div>

</div>
