<div class="login-wrapper">
  <c-card class="login-card">

    <div class="login-header">
      <div class="login-logo">
        <img src="assets/brand/logo-mark.png" alt="J.A. Leilões" />
      </div>
      <h1>Criar Conta</h1>
      <p>Preencha os dados para criar sua conta</p>
    </div>

    <c-card-body class="login-body">
      <form cForm>

        <div class="mb-3">
          <label class="form-label-modern">Nome</label>
          <div class="input-icon-wrapper">
            <svg cIcon name="cilUser" class="input-icon"></svg>
            <input autoComplete="name" cFormControl placeholder="Nome completo" />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label-modern">E-mail</label>
          <div class="input-icon-wrapper">
            <svg cIcon name="cilEnvelopeClosed" class="input-icon"></svg>
            <input autoComplete="email" cFormControl placeholder="seu@email.com" type="email" />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label-modern">Senha</label>
          <div class="input-icon-wrapper">
            <svg cIcon name="cilLockLocked" class="input-icon"></svg>
            <input autoComplete="new-password" cFormControl placeholder="Mínimo 6 caracteres" type="password" />
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label-modern">Confirmar Senha</label>
          <div class="input-icon-wrapper">
            <svg cIcon name="cilLockLocked" class="input-icon"></svg>
            <input autoComplete="new-password" cFormControl placeholder="Repita a senha" type="password" />
          </div>
        </div>

        <button cButton class="btn-login mb-3" type="submit">Criar Conta</button>

        <div class="text-center">
          <a routerLink="/login" class="auth-link">Já tem conta? Entrar</a>
        </div>

      </form>
    </c-card-body>

  </c-card>
</div>
