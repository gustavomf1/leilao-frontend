<div class="mb-3">
  <label cLabel [for]="id">{{ label }}</label>
  <div class="input-group">
    <input cFormControl [id]="id" [value]="displayValue" readonly [placeholder]="placeholder" />
    <button cButton color="primary" type="button" (click)="setModal(true)">
      <fa-icon [icon]="faSearchPlus"></fa-icon>
    </button>
  </div>
</div>

<c-modal [visible]="visible" (visibleChange)="setModal($event)" size="lg">
  <c-modal-header>
    <h5 cModalTitle>{{ modalTitle }}</h5>
    <button (click)="setModal(false)" cButtonClose></button>
  </c-modal-header>
  <c-modal-body>
    <ng-content></ng-content>
  </c-modal-body>
</c-modal>
