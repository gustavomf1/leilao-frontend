<div class="p-2">
  <div class="input-group mb-3">
    <input
      type="text"
      class="form-control"
      placeholder="Digite o nome da fazenda (mín. 2 caracteres)..."
      [(ngModel)]="busca"
      (input)="onBusca()" />
    <span class="input-group-text">
      <fa-icon *ngIf="!carregando" [icon]="faSearch"></fa-icon>
      <fa-icon *ngIf="carregando" [icon]="faCircleNotch" animation="spin"></fa-icon>
    </span>
  </div>

  <div *ngIf="buscaFeita && fazendas.length === 0 && !mostrarCadastro" class="text-center py-3 text-secondary">
    Nenhuma fazenda encontrada.
  </div>

  <div class="list-group mb-3" *ngIf="fazendas.length > 0 && !mostrarCadastro" style="max-height: 250px; overflow-y: auto;">
    <button
      *ngFor="let fazenda of fazendas"
      type="button"
      class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
      (click)="selecionar(fazenda)">
      <div>
        <div class="fw-semibold">{{ fazenda.nome }}</div>
        <small class="text-secondary">{{ fazenda.cidade }}/{{ fazenda.uf }} · CNPJ: {{ fazenda.cnpj }}</small>
      </div>
      <fa-icon [icon]="faCheck" class="text-success ms-2"></fa-icon>
    </button>
  </div>

  <div *ngIf="!buscaFeita && !mostrarCadastro" class="text-center py-2 text-secondary" style="font-size: 0.85rem;">
    Digite para buscar uma fazenda existente
  </div>

  <div *ngIf="mostrarCadastro && fazendasDetailsComponent" class="border-top pt-3">
    <ng-container *ngComponentOutlet="fazendasDetailsComponent; inputs: { modoSubform: true, ocultarTitular: true }"></ng-container>
  </div>

  <div class="border-top pt-3 mt-2">
    <button type="button" class="btn btn-outline-primary btn-sm w-100" (click)="toggleCadastro()">
      <fa-icon [icon]="mostrarCadastro ? faTimes : faPlus" class="me-1"></fa-icon>
      {{ mostrarCadastro ? 'Cancelar cadastro' : 'Cadastrar nova fazenda' }}
    </button>
  </div>
</div>
