<div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
  <input cFormControl
         type="text"
         class="w-auto"
         style="min-width: 260px"
         placeholder="Buscar por nome ou CPF/CNPJ..."
         [(ngModel)]="termoBusca"
         (ngModelChange)="onBuscaDigitada()" />

  <select cSelect class="w-auto" [ngModel]="tamanhoPagina"
          (ngModelChange)="onTamanhoAlterado($event)">
    <option *ngFor="let t of tamanhosDisponiveis" [value]="t">{{ t }} por página</option>
  </select>
</div>

<c-pagination *ngIf="totalPaginas > 1" align="center" class="mt-3">
  <li cPageItem [disabled]="paginaAtual === 0">
    <a cPageLink href="javascript:void(0)" (click)="irPara(paginaAtual - 1)">Anterior</a>
  </li>
  <li cPageItem [active]="true">
    <a cPageLink href="javascript:void(0)">{{ paginaAtual + 1 }} / {{ totalPaginas }}</a>
  </li>
  <li cPageItem [disabled]="paginaAtual >= totalPaginas - 1">
    <a cPageLink href="javascript:void(0)" (click)="irPara(paginaAtual + 1)">Próxima</a>
  </li>
</c-pagination>
