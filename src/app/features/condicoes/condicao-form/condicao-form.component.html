<div class="page-header">
  <h2 class="page-title">{{ isEdicao ? 'Editar Condição' : 'Nova Condição' }}</h2>
</div>

<div class="form-card">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-grid">

      <div class="form-group full-width">
        <label>Descrição *</label>
        <input type="text" formControlName="descricao" placeholder="Ex: 10 DIAS DIRETO">
      </div>

      <div class="form-group">
        <label>Captação</label>
        <input type="number" formControlName="captacao">
      </div>

      <div class="form-group">
        <label>Parcelas</label>
        <input type="number" formControlName="parcelas">
      </div>

      <div class="form-group">
        <label>Qtd Dias</label>
        <input type="number" formControlName="qtdDias">
      </div>

      <div class="form-group">
        <label>% Desconto</label>
        <input type="number" formControlName="percentualDesconto">
      </div>

      <div class="form-group full-width">
        <label>Opções</label>
        <div style="display: flex; gap: 1.5rem;">
          <label>
            <input type="checkbox"
              [checked]="form.get('comEntrada')?.value === 'S'"
              (change)="form.get('comEntrada')?.setValue($any($event.target).checked ? 'S' : 'N')">
            Com Entrada
          </label>
          <label>
            <input type="checkbox"
              [checked]="form.get('mesmoDia')?.value === 'S'"
              (change)="form.get('mesmoDia')?.setValue($any($event.target).checked ? 'S' : 'N')">
            Mesmo Dia
          </label>
        </div>
      </div>

      <div class="form-group">
        <label>Tipo</label>
        <div style="display: flex; flex-wrap: wrap; gap: 0.75rem;">
          @for (tipo of tiposCondicao; track tipo) {
            <label>
              <input type="radio" formControlName="tipoCondicao" [value]="tipo"> {{ tipo }}
            </label>
          }
        </div>
      </div>

      <div class="form-group">
        <label>Aceite Integrado (Comissão Venda)</label>
        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
          @for (aceite of aceitesIntegrado; track aceite.value) {
            <label>
              <input type="radio" formControlName="aceiteIntegrado" [value]="aceite.value"> {{ aceite.label }}
            </label>
          }
        </div>
      </div>

    </div>
    <div class="form-actions">
      <button type="submit" class="btn-primary" [disabled]="form.invalid">Salvar</button>
      <button type="button" class="btn-secondary" (click)="voltar()">Cancelar</button>
    </div>
  </form>
</div>
