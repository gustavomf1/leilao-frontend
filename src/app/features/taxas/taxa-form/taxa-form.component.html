<div class="page-header">
  <h2 class="page-title">{{ isEdicao ? 'Editar Taxa' : 'Nova Taxa' }}</h2>
</div>

<div class="form-card">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-grid">
      <div class="form-group">
        <label>Comissão Vendedor (%)</label>
        <input type="number" formControlName="comissaoVendedor" placeholder="Comissão Vendedor" step="0.01">
      </div>
      <div class="form-group">
        <label>Comissão Comprador (%)</label>
        <input type="number" formControlName="comissaoComprador" placeholder="Comissão Comprador" step="0.01">
      </div>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label>Espécie</label>
        <input type="text" formControlName="especie" placeholder="Ex: Bovino, Equino">
      </div>
      <div class="form-group">
        <label>Tipo de Leilão</label>
        <input type="text" formControlName="tipoLeilao" placeholder="Ex: Leilão Online, Leilão Presencial">
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn-primary" [disabled]="form.invalid">Salvar</button>
      <button type="button" class="btn-secondary" (click)="voltar()">Cancelar</button>
    </div>
  </form>
</div>
